[platformio]
default_envs = pico_w
; default_envs = test_display

[env:pico_w]
platform = raspberrypi
board = rpipicow
framework = arduino

; Serial communication speed
monitor_speed = 115200

; Build options
build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17

; Filesystem for storing programs
board_build.filesystem_size = 256k
board_build.filesystem = littlefs

; Library dependencies
lib_deps =
  ; OLED display SSD1306
  adafruit/Adafruit SSD1306@^2.5.7
  adafruit/Adafruit GFX Library@^1.11.3

  ; Temperature sensors OneWire (DS18B20)
  paulstoffregen/OneWire@^2.3.7
  milesburton/DallasTemperature@^3.11.0

  ; I2C and sensors
  adafruit/Adafruit BusIO@^1.14.1

  ; Rotary Encoder
  mathertel/RotaryEncoder@^1.5.3

  ; Button debounce
  thomasfredericks/Bounce2@^2.71

  ; DAC GP8403
  dfrobot/DFRobot_GP8403@^1.0.0

  ; Temperature and humidity sensor CHT8305
  robtillaart/CHT8305@^0.2.3

  ; RTC DS1307
  adafruit/RTClib@^2.1.1

  ; JSON parsing for program files
  bblanchon/ArduinoJson@^7.0.0

  ; SD card library
  arduino-libraries/SD@^1.2.4

  ; Logging library
  thijse/ArduinoLog@^1.1.1

; Serial port configuration (adapt to your system)
; upload_port = /dev/cu.usbmodem*
; monitor_port = /dev/cu.usbmodem*

; Display test environment
[env:test_display]
platform = raspberrypi
board = rpipicow
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/test_display.cpp>
build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.7
  adafruit/Adafruit GFX Library@^1.11.3
  adafruit/Adafruit BusIO@^1.14.1

; Minimal main test (display only, no sensors)
[env:test_minimal]
platform = raspberrypi
board = rpipicow
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/test_main_minimal.cpp> +<Display.cpp> +<DisplayHelpers.cpp>
build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17
  -I include
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.7
  adafruit/Adafruit GFX Library@^1.11.3
  adafruit/Adafruit BusIO@^1.14.1

; Native testing environment
[env:native]
platform = native
build_flags =
  -std=gnu++17
  -I include
test_framework = unity
; test_build_src = yes

; Hydraulic heater test
[env:test_hydraulic]
platform = raspberrypi
board = rpipicow
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/test_hydraulic_heater.cpp> +<HydraulicHeater.cpp>
build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17
  -I include

; Relay test
[env:test_relay]
platform = raspberrypi
board = rpipicow
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../test/test_relay.cpp>
build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17
  -I include
