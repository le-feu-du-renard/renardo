[platformio]
default_envs = pico_w

[env:pico_w]
platform = raspberrypi
board = rpipicow
framework = arduino

monitor_speed = 115200

build_flags =
  -D CORE_DEBUG_LEVEL=5
  -D PICO_W
  -std=gnu++17

; Library dependencies
lib_deps =
  ; I2C bus I/O (required by Adafruit libs)
  adafruit/Adafruit BusIO@^1.14.1

  ; MCP23017 I2C LED expander
  adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

  ; RS485 Modbus RTU
  4-20ma/ModbusMaster@^2.0.1

  ; RTC DS1307
  adafruit/RTClib@^2.1.1

  ; SD card
  arduino-libraries/SD@^1.2.4

  ; Logging
  thijse/ArduinoLog@^1.1.1

; SHT30 RS485 direct test (no abstraction layer) — flash standalone to RPico
[env:test_sht30_direct]
platform = raspberrypi
board = rpipicow
framework = arduino
monitor_speed = 115200
build_flags =
  -D PICO_W
  -std=gnu++17
  -I include
build_src_filter = -<*> +<../test/e2e/test_sht30_direct.cpp>
lib_deps =
  4-20ma/ModbusMaster@^2.0.1

